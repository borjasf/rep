spring.application.name=productos
server.port=8081

# Permitir sobrescritura de beans si hay conflictos internos
spring.main.allow-bean-definition-overriding=true

# ---------------------------------------------------------
# CONFIGURACION JPA / MySQL 
# ---------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/aadd?createDatabaseIfNotExist=true&serverTimezone=CET
spring.datasource.username=root
spring.datasource.password=practicas
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Actualiza las tablas automaticamente si hay cambios en el modelo
spring.jpa.hibernate.ddl-auto=update

# Opcional: mostrar las consultas en consola (util para ver que hace)
spring.jpa.show-sql=true