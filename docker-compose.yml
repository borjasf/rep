services:
  # 1. Bases de datos y Mensajería
  mysql:
    image: mysql:8
    ports:
      - "3307:3306" # Puerto host 3307 mapeado al 3306 interno de MySQL
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql # Script de inicialización
    networks:
      - arso-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - arso-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # Puerto de comunicación
      - "15672:15672" # Puerto del panel web de administración
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - arso-network

  # 2. Microservicios
  usuarios:
    build:
      context: ./microservicio-usuarios # Construye usando el Dockerfile de esta carpeta
    ports:
      - "8080:8080"
    # usuarios es Jersey/Tomcat (no Spring Boot): la BD se configura en persistence.xml.
    # RABBITMQ_URI la leen PublicadorEventosRabbitMQ y ConsumidorEventos como override.
    environment:
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672
      - JDBC_URL=jdbc:mysql://mysql:3306/db_usuarios?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - JDBC_USERNAME=root
      - JDBC_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - arso-network

  productos:
    build: 
      context: ./productos
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_productos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - arso-network

  compraventas:
    build: 
      context: ./microservicio-compraventas/microservicio-compraventas
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/compraventas_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      # URLs para Retrofit
      - USUARIOS_API_URL=http://usuarios:8080
      - PRODUCTOS_API_URL=http://productos:8083
    depends_on:
        mongodb:
          condition: service_healthy
        rabbitmq:
          condition: service_started
        usuarios:
          condition: service_started
        productos:
          condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - arso-network

  pasarela:
    build: 
      context: ./pasarela
    ports:
      - "9090:8090" # El puerto público al que accederás desde tu navegador
    environment:
      # Configuración para que la pasarela sepa dónde están los microservicios
      - ZUUL_ROUTES_USUARIOS_URL=http://usuarios:8080/api/usuarios/
      - ZUUL_ROUTES_PRODUCTOS_URL=http://productos:8083/productos/
      - ZUUL_ROUTES_COMPRAVENTAS_URL=http://compraventas:8082/compraventas/
    depends_on:
      usuarios:
        condition: service_started
      productos:
        condition: service_healthy
      compraventas:
        condition: service_healthy
    networks:
      - arso-network

# Definición de volúmenes persistentes y redes
volumes:
  mysql-data:
  mongo-data:

networks:
  arso-network:
    driver: bridge