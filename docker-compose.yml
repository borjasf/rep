version: '3.8'

services:
  # --- BASES DE DATOS Y MENSAJERÍA ---
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usuarios_db
    ports:
      - "3306:3306"

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  # --- MICROSERVICIOS ---
  usuarios:
    build: ./microservicio-usuarios
    ports:
      - "8081:8080"
    environment:
      - JAVA_OPTS=-Djavax.persistence.jdbc.url=jdbc:mysql://mysql:3306/usuarios_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC -Djavax.persistence.jdbc.user=root -Djavax.persistence.jdbc.password=root
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - mysql
      - rabbitmq

  productos:
    build: ./productos
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/productos
      - SPRING_RABBITMQ_ADDRESSES=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - mongo
      - rabbitmq

  compraventas:
    build: ./microservicio-compraventas/microservicio-compraventas
    ports:
      - "8083:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/compraventas
      - SPRING_RABBITMQ_ADDRESSES=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - mongo
      - rabbitmq

  pasarela:
    build: ./pasarela
    ports:
      - "8090:8090"
    environment:
      - ZUUL_ROUTES_USUARIOS_URL=http://usuarios:8080/api/usuarios/
      - ZUUL_ROUTES_PRODUCTOS_URL=http://productos:8080/productos/
      - ZUUL_ROUTES_COMPRAVENTAS_URL=http://compraventas:8080/compraventas/
      - API_USUARIOS_URL=http://usuarios:8080/api/
    depends_on:
      - usuarios
      - productos
      - compraventas